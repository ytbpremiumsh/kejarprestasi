# Nginx config untuk Kejar Prestasi — STATIC SPA (Vite + React Router)
# Setelah refactor, tidak ada lagi Node SSR / PM2. Cukup serve dist/ statis.
#
# Copy ke /etc/nginx/conf.d/kejarprestasi.id.conf
# Lalu:  nginx -t && systemctl reload nginx
#
# HTTPS: gunakan certbot — certbot --nginx -d kejarprestasi.id -d www.kejarprestasi.id

server {
  listen 80;
  listen [::]:80;
  server_name kejarprestasi.id www.kejarprestasi.id;

  root /www/wwwroot/kejarprestasi.id;
  index index.html;

  client_max_body_size 20m;

  # Asset hashed (Vite) — cache panjang, immutable
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    access_log off;
    try_files $uri =404;
  }

  # File statis root yang umum
  location = /favicon.ico { access_log off; log_not_found off; try_files $uri =404; }
  location = /robots.txt  { access_log off; log_not_found off; try_files $uri =404; }

  # ads.txt — file statis dari public/ads.txt (di-build ke dist/ads.txt)
  location = /ads.txt {
    default_type text/plain;
    add_header Cache-Control "public, max-age=3600" always;
    access_log off;
    try_files $uri =404;
  }

  # SPA fallback — semua route React Router dilayani index.html
  location / {
    try_files $uri $uri/ /index.html;
  }

  # index.html jangan di-cache supaya update Vite langsung terlihat
  location = /index.html {
    add_header Cache-Control "no-store, no-cache, must-revalidate";
    expires 0;
  }
}
