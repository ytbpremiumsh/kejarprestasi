# Nginx reverse proxy untuk Kejar Prestasi (Node SSR)
# Copy ke /etc/nginx/conf.d/kejarprestasi.id.conf lalu: nginx -t && systemctl reload nginx
#
# Untuk HTTPS gunakan certbot:
#   certbot --nginx -d kejarprestasi.id -d www.kejarprestasi.id

upstream kejarprestasi_node {
  server 127.0.0.1:3000;
  keepalive 32;
}

server {
  listen 80;
  listen [::]:80;
  server_name kejarprestasi.id www.kejarprestasi.id;

  client_max_body_size 20m;

  # Static assets — Nginx langsung dari disk (bypass Node)
  location /assets/ {
    alias /www/wwwroot/kejarprestasi.id/assets/;
    expires 1y;
    add_header Cache-Control "public, immutable";
    access_log off;
    try_files $uri =404;
  }

  # Favicon, robots, dll dari client build
  location = /favicon.ico { alias /www/wwwroot/kejarprestasi.id/favicon.ico; access_log off; log_not_found off; }
  location = /robots.txt  { alias /www/wwwroot/kejarprestasi.id/robots.txt;  access_log off; log_not_found off; }

  # SSR + API + websocket → Node
  location / {
    proxy_pass http://kejarprestasi_node;
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host  $host;
    proxy_set_header Upgrade           $http_upgrade;
    proxy_set_header Connection        "upgrade";
    proxy_read_timeout 60s;
    proxy_send_timeout 60s;
  }
}
